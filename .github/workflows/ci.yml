name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, order-service, inventory-service, notification-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install
        run: npm ci

      - name: Prisma generate
        if: ${{ hashFiles(format('services/{0}/prisma/schema.prisma', matrix.service)) != '' }}
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker-build:
    name: Docker build · ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, order-service, inventory-service, notification-service, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  compose-validate:
    name: docker-compose validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate prod compose
        working-directory: infrastructure
        run: docker compose -f docker-compose.prod.yaml config --quiet
        env:
          AUTH_DATABASE_URL: postgres://ci:ci@ci/ci
          ORDER_DATABASE_URL: postgres://ci:ci@ci/ci
          INVENTORY_DATABASE_URL: postgres://ci:ci@ci/ci
          REDIS_URL: redis://ci
          REDIS_HOST: ci
          REDIS_PORT: "6379"
          REDIS_PASSWORD: ci
          RABBITMQ_USER: ci
          RABBITMQ_PASS: ci
          JWT_ACCESS_SECRET: ci
          JWT_REFRESH_SECRET: ci
          ADMIN_EMAILS: ci@ci
          MINIO_ROOT_USER: ci
          MINIO_ROOT_PASSWORD: ci
          MINIO_BUCKET: ci
          MINIO_PUBLIC_URL: http://localhost:9000
